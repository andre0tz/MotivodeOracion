<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versículo del Día</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: transparent !important;
      font-family: 'Nunito', system-ui, sans-serif;
      padding: 0;
      margin: 0;
    }
    .widget {
      background: transparent !important;
      padding: 0.75rem 1rem;
      max-width: 320px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2383E2;
    }
    .date {
      font-size: 0.72rem;
      color: #888888;
    }
    .quote-mark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.5rem;
      color: #2383E2;
      opacity: 0.4;
      line-height: 1;
      display: block;
      margin-bottom: 0.2rem;
    }
    .verse-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.2rem;
      font-style: italic;
      line-height: 1.55;
      color: inherit;
      margin-bottom: 0.9rem;
      animation: fadeIn 0.5s ease;
    }
    .reference {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(35,131,226,0.12);
      color: #2383E2;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 4px 14px;
    }
    .loader {
      display: flex;
      gap: 6px;
      padding: 1rem 0;
    }
    .loader span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2383E2;
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <span class="label">✦ Versículo del Día</span>
    <span class="date" id="todayDate"></span>
  </div>
  <div class="loader" id="loader"><span></span><span></span><span></span></div>
  <div id="verseContent" style="display:none;">
    <span class="quote-mark" aria-hidden="true">"</span>
    <p class="verse-text" id="verseText"></p>
    <span class="reference" id="verseRef">📖 —</span>
  </div>
</div>
<script>
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-MX', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }).replace(/^\w/, c => c.toUpperCase());

  const FALLBACK = [
    { text: 'Vengan a mí todos ustedes que están cansados y agobiados, y yo les daré descanso.', ref: 'Mateo 11:28' },
    { text: 'Todo lo puedo en Cristo que me fortalece.', ref: 'Filipenses 4:13' },
    { text: 'El Señor es mi pastor, nada me faltará.', ref: 'Salmo 23:1' },
    { text: 'Porque yo sé los planes que tengo para ustedes, planes de bienestar y no de calamidad.', ref: 'Jeremías 29:11' },
    { text: 'Encomienda al Señor tu camino; confía en él, y él actuará.', ref: 'Salmo 37:5' },
    { text: 'El que comenzó tan buena obra en ustedes la irá perfeccionando hasta el día de Cristo Jesús.', ref: 'Filipenses 1:6' },
    { text: 'Busquen primeramente el reino de Dios y su justicia, y todas estas cosas les serán añadidas.', ref: 'Mateo 6:33' },
    { text: 'No se angustien por nada; más bien, presenten sus peticiones a Dios con oración y acción de gracias.', ref: 'Filipenses 4:6' },
    { text: 'El amor es paciente, es bondadoso. El amor no es envidioso ni jactancioso ni orgulloso.', ref: '1 Corintios 13:4' },
    { text: 'Fíate de Jehová de todo tu corazón y no te apoyes en tu propia prudencia.', ref: 'Proverbios 3:5' },
    { text: 'Dios es nuestro amparo y nuestra fortaleza, nuestra ayuda segura en momentos de angustia.', ref: 'Salmo 46:1' },
    { text: 'Porque de tal manera amó Dios al mundo, que dio a su Hijo unigénito.', ref: 'Juan 3:16' },
  ];

  const VERSE_IDS = [
    'MAT.11.28','PHP.4.13','PSA.23.1','JER.29.11','PSA.37.5',
    'PHP.1.6','MAT.6.33','PHP.4.6','1CO.13.4','PRO.3.5',
    'PSA.46.1','JHN.3.16'
  ];

  function getDayIndex() {
    const now = new Date(), start = new Date(now.getFullYear(), 0, 0);
    return Math.floor((now - start) / 86400000) % FALLBACK.length;
  }

  function showVerse(text, ref) {
    document.getElementById('verseText').textContent = text;
    document.getElementById('verseRef').textContent  = '📖 ' + ref;
    document.getElementById('loader').style.display       = 'none';
    document.getElementById('verseContent').style.display = 'block';
  }

  async function loadVerse() {
    try {
      const key = 'verse_' + new Date().toISOString().slice(0, 10);
      const cached = localStorage.getItem(key);
      if (cached) { const v = JSON.parse(cached); showVerse(v.text, v.ref); return; }
      const id  = VERSE_IDS[getDayIndex()];
      const res = await fetch(`https://bible-api.com/${encodeURIComponent(id)}?translation=rve`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const text = data.text.trim().replace(/\s+/g, ' ');
      const ref  = data.reference;
      try { localStorage.setItem(key, JSON.stringify({ text, ref })); } catch {}
      showVerse(text, ref);
    } catch {
      const v = FALLBACK[getDayIndex()];
      showVerse(v.text, v.ref);
    }
  }

  loadVerse();
</script>
</body>
</html>
