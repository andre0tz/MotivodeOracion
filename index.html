<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motivo de Oración</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:             #ffffff;
      --card-bg:        #ffffff;
      --card-border:    #e8edf2;
      --accent:         #4A7FB5;
      --accent-light:   #eaf1f8;
      --text-primary:   #1a2433;
      --text-secondary: #5a6a7e;
      --text-tertiary:  #9aa5b4;
      --font-display:   'Cormorant Garamond', Georgia, serif;
      --font-body:      'Nunito', system-ui, sans-serif;
      --radius:         16px;
      --shadow:         0 2px 16px rgba(74,127,181,0.07);
      --max-width:      340px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #0f1923;
        --card-bg:        #162130;
        --card-border:    #1e3248;
        --accent:         #6fa8dc;
        --accent-light:   #1a2e42;
        --text-primary:   #e8eef5;
        --text-secondary: #8da8c4;
        --text-tertiary:  #4a6480;
        --shadow:         0 2px 20px rgba(0,0,0,0.35);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background 0.3s ease;
    }
    .widget {
      width: 100%;
      max-width: var(--max-width);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 0.6rem;
    }
    .label {
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .prayer-text {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-primary);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="widget" role="main" aria-label="Motivo de Oración">
  <div class="header">
    <span aria-hidden="true">🙏</span>
    <span class="label">Motivo de Oración</span>
  </div>
  <p class="prayer-text" id="prayerText"></p>
</div>
<script>
  const PRAYERS = [
    'Orar por la unidad y protección de mi familia, que Dios guíe cada hogar.',
    'Por la salvación de familiares que aún no conocen a Cristo.',
    'Por la salud física y emocional de cada miembro de la congregación.',
    'Por sanidad completa de quienes están enfermos en el cuerpo de Cristo.',
    'Por el crecimiento del ministerio y que cada vida sea transformada.',
    'Por sabiduría y unidad en el equipo de liderazgo.',
    'Por favor y provisión en el trabajo para el avance del ministerio.',
    'Por nuevas puertas de oportunidad que solo Dios puede abrir.',
    'Por una mayor intimidad con Dios en la oración y Su Palabra.',
    'Por fortaleza y renovación espiritual en cada temporada de prueba.',
    'Por los jóvenes de la congregación, que encuentren su propósito en Cristo.',
    'Por los que atraviesan duelo, que el Espíritu Santo los consuele.',
  ];

  function getDailyPrayer() {
    const now   = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const day   = Math.floor((now - start) / 86400000);
    return PRAYERS[day % PRAYERS.length];
  }

  document.getElementById('prayerText').textContent = getDailyPrayer();
</script>
</body>
</html>
